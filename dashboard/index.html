<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Search Agent</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f4f2;min-height:100vh;padding:24px;color:#1a1a1a}
.page{max-width:860px;margin:0 auto;display:flex;flex-direction:column;gap:16px}
.card{background:#fff;border:0.5px solid #e5e5e5;border-radius:12px;padding:20px 24px}
.top-bar{display:flex;align-items:center;padding:14px 24px;background:#fff;border:0.5px solid #e5e5e5;border-radius:12px}
.logo{font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px;color:#1a1a1a}
.logo-dot{width:8px;height:8px;border-radius:50%;background:#5DCAA5}
.input-label{font-size:12px;color:#888;margin-bottom:10px;letter-spacing:0.03em}
.mode-row{display:flex;gap:8px;margin-bottom:14px}
.mode-btn{background:none;border:0.5px solid #e5e5e5;border-radius:8px;font-size:13px;padding:6px 16px;cursor:pointer;color:#888;transition:all 0.15s;font-family:inherit}
.mode-btn.active{background:#E1F5EE;border-color:#5DCAA5;color:#0F6E56;font-weight:500}
.input-row{display:flex;gap:10px;align-items:flex-start}
input[type=text]{flex:1;height:40px;border:0.5px solid #e5e5e5;border-radius:8px;padding:0 12px;font-size:13px;font-family:inherit;background:#fafafa;color:#1a1a1a;outline:none;transition:all 0.15s}
input[type=text]:focus{border-color:#5DCAA5;box-shadow:0 0 0 3px #E1F5EE;background:#fff}
textarea{flex:1;min-height:110px;border:0.5px solid #e5e5e5;border-radius:8px;padding:10px 12px;font-size:13px;font-family:inherit;background:#fafafa;color:#1a1a1a;outline:none;resize:vertical;line-height:1.5;transition:all 0.15s}
textarea:focus{border-color:#5DCAA5;box-shadow:0 0 0 3px #E1F5EE;background:#fff}
.run-btn{height:40px;padding:0 22px;background:#1D9E75;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px;font-family:inherit;transition:opacity 0.15s}
.run-btn:hover{opacity:0.88}
.run-btn:disabled{opacity:0.4;cursor:not-allowed}
.progress-card{background:#fff;border:0.5px solid #e5e5e5;border-radius:12px;padding:16px 24px;display:none}
.progress-card.visible{display:block}
.progress-label{font-size:12px;color:#888;margin-bottom:12px}
.agents-row{display:flex;gap:8px;flex-wrap:wrap}
.agent-pill{font-size:12px;padding:5px 14px;border-radius:100px;border:0.5px solid #e5e5e5;color:#bbb;display:flex;align-items:center;gap:6px;transition:all 0.2s}
.agent-pill.running{border-color:#5DCAA5;color:#0F6E56;background:#E1F5EE}
.agent-pill.done{border-color:#9FE1CB;color:#085041;background:#E1F5EE}
.agent-pill.running i{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-card{background:#fef2f2;border:0.5px solid #fca5a5;border-radius:12px;padding:14px 20px;display:none;font-size:13px;color:#991b1b}
.error-card.visible{display:block}
.results{display:none;flex-direction:column;gap:16px}
.results.visible{display:flex}
.section-label{font-size:11px;font-weight:500;color:#aaa;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:12px}
.score-row{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.score-badge{display:flex;align-items:baseline;gap:4px}
.score-num{font-size:36px;font-weight:500;line-height:1}
.score-num.high{color:#0F6E56}
.score-num.mid{color:#BA7517}
.score-num.low{color:#dc2626}
.score-denom{font-size:14px;color:#bbb}
.score-meta{flex:1}
.score-company{font-size:15px;font-weight:500;color:#1a1a1a}
.score-role{font-size:13px;color:#888;margin-top:2px}
.status-pill{font-size:12px;padding:5px 14px;border-radius:100px;background:#E1F5EE;color:#0F6E56;border:0.5px solid #9FE1CB;font-weight:500}
.divider{border:none;border-top:0.5px solid #f0f0f0;margin:16px 0}
.flags-row{display:flex;flex-direction:column;gap:6px}
.red-flag-item{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:#666}
.red-flag-item i{margin-top:2px;flex-shrink:0;color:#BA7517;font-size:14px}
.tab-card{background:#fff;border:0.5px solid #e5e5e5;border-radius:12px;overflow:hidden}
.tab-bar{display:flex;border-bottom:0.5px solid #f0f0f0;background:#fafafa}
.tab{flex:1;padding:13px 16px;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-0.5px;font-size:13px;font-family:inherit;color:#888;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:6px}
.tab:hover{color:#1a1a1a;background:#f4f4f4}
.tab.active{color:#0F6E56;border-bottom-color:#1D9E75;font-weight:500;background:#fff}
.tab-body{padding:24px}
.tab-panel{display:none}
.tab-panel.active{display:block}
.output-flag-banner{background:#FFF8E6;border:0.5px solid #FAC775;border-radius:8px;padding:10px 14px;margin-bottom:16px;display:flex;align-items:flex-start;gap:8px;font-size:12px;color:#633806;line-height:1.5}
.output-flag-banner i{flex-shrink:0;margin-top:1px;color:#BA7517;font-size:14px}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.copy-btn{display:flex;align-items:center;gap:5px;background:none;border:0.5px solid #e5e5e5;border-radius:8px;font-size:12px;padding:5px 12px;cursor:pointer;color:#888;transition:all 0.15s;font-family:inherit}
.copy-btn:hover{border-color:#5DCAA5;color:#0F6E56}
.copy-btn.copied{border-color:#5DCAA5;color:#0F6E56;background:#E1F5EE}
.cover-text{font-size:13px;line-height:1.9;color:#1a1a1a;white-space:pre-wrap}
.notes-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.note-item{display:flex;align-items:flex-start;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;border:0.5px solid transparent;transition:background 0.1s}
.note-item:hover{background:#fafafa;border-color:#f0f0f0}
.note-item.checked{opacity:0.4}
.note-cb{width:16px;height:16px;border:0.5px solid #d0d0d0;border-radius:4px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all 0.15s}
.note-item.checked .note-cb{background:#E1F5EE;border-color:#5DCAA5;color:#0F6E56}
.note-text{font-size:13px;line-height:1.5;color:#1a1a1a}
.notes-progress{font-size:12px;color:#aaa}
.notes-badge{background:#E1F5EE;color:#0F6E56;border-radius:100px;padding:1px 8px;font-size:11px;margin-left:4px}
.brief-text{font-size:13px;line-height:1.9;color:#1a1a1a}
</style>
</head>
<body>

<div class="page">

  <div class="top-bar">
    <div class="logo"><span class="logo-dot"></span>Job search agent</div>
  </div>

  <div class="card">
    <div class="input-label">Job posting</div>
    <div class="mode-row">
      <button class="mode-btn active" id="urlBtn" onclick="setMode('url')">
        <i class="ti ti-link" style="font-size:14px;vertical-align:-1px;margin-right:4px" aria-hidden="true"></i>URL
      </button>
      <button class="mode-btn" id="textBtn" onclick="setMode('text')">
        <i class="ti ti-clipboard-text" style="font-size:14px;vertical-align:-1px;margin-right:4px" aria-hidden="true"></i>Paste text
      </button>
    </div>
    <div class="input-row">
      <input type="text" id="urlInput" placeholder="https://boards.greenhouse.io/company/jobs/..." />
      <textarea id="textInput" placeholder="Paste the full job description here..." style="display:none"></textarea>
      <button class="run-btn" id="runBtn" onclick="runPipeline()">
        <i class="ti ti-player-play" style="font-size:14px" aria-hidden="true"></i>Run
      </button>
    </div>
  </div>

  <div class="progress-card" id="progressCard">
    <div class="progress-label">Running pipeline</div>
    <div class="agents-row">
      <span class="agent-pill" id="p1"><i class="ti ti-circle" style="font-size:12px" aria-hidden="true"></i>Job analyst</span>
      <span class="agent-pill" id="p2"><i class="ti ti-circle" style="font-size:12px" aria-hidden="true"></i>CV advisor</span>
      <span class="agent-pill" id="p3"><i class="ti ti-circle" style="font-size:12px" aria-hidden="true"></i>Cover letter</span>
      <span class="agent-pill" id="p4"><i class="ti ti-circle" style="font-size:12px" aria-hidden="true"></i>Company intel</span>
      <span class="agent-pill" id="p5"><i class="ti ti-circle" style="font-size:12px" aria-hidden="true"></i>Critic</span>
    </div>
  </div>

  <div class="error-card" id="errorCard"></div>

  <div class="results" id="results">

    <div class="card">
      <div class="score-row">
        <div class="score-badge">
          <span class="score-num" id="scoreNum">—</span>
          <span class="score-denom">/10</span>
        </div>
        <div class="score-meta">
          <div class="score-company" id="scoreCompany">—</div>
          <div class="score-role" id="scoreRole">—</div>
        </div>
        <span class="status-pill">To Apply</span>
      </div>
      <div id="redFlagsWrap" style="display:none">
        <hr class="divider">
        <div class="section-label">Job red flags</div>
        <div class="flags-row" id="redFlags"></div>
      </div>
    </div>

    <div class="tab-card">
      <div class="tab-bar">
        <button class="tab active" id="tab-btn-cover" onclick="setTab('cover')">
          <i class="ti ti-mail" style="font-size:14px" aria-hidden="true"></i>Cover letter
        </button>
        <button class="tab" id="tab-btn-notes" onclick="setTab('notes')">
          <i class="ti ti-list-check" style="font-size:14px" aria-hidden="true"></i>CV notes
          <span class="notes-badge" id="notesBadge">0/0</span>
        </button>
        <button class="tab" id="tab-btn-brief" onclick="setTab('brief')">
          <i class="ti ti-building" style="font-size:14px" aria-hidden="true"></i>Company brief
        </button>
      </div>

      <div class="tab-body">

        <div class="tab-panel active" id="tab-cover">
          <div id="outputFlagBanner" style="display:none" class="output-flag-banner">
            <i class="ti ti-info-circle" aria-hidden="true"></i>
            <span id="outputFlagText"></span>
          </div>
          <div class="panel-header">
            <span style="font-size:12px;color:#aaa">Ready to copy</span>
            <button class="copy-btn" id="copyBtn" onclick="copyCover()">
              <i class="ti ti-copy" style="font-size:14px" aria-hidden="true"></i>Copy
            </button>
          </div>
          <div class="cover-text" id="coverText"></div>
        </div>

        <div class="tab-panel" id="tab-notes">
          <div class="panel-header">
            <span style="font-size:13px;color:#888">Check off as you update your CV</span>
            <span class="notes-progress" id="notesProgress">0/0 done</span>
          </div>
          <ul class="notes-list" id="notesList"></ul>
        </div>

        <div class="tab-panel" id="tab-brief">
          <div class="brief-text" id="briefText"></div>
        </div>

      </div>
    </div>

  </div>
</div>

<script>
let mode = 'url'
let checked = new Set()

function setMode(m) {
  mode = m
  document.getElementById('urlInput').style.display = m === 'url' ? 'block' : 'none'
  document.getElementById('textInput').style.display = m === 'text' ? 'block' : 'none'
  document.getElementById('urlBtn').classList.toggle('active', m === 'url')
  document.getElementById('textBtn').classList.toggle('active', m === 'text')
}

function setTab(t) {
  ;['cover', 'notes', 'brief'].forEach(name => {
    document.getElementById('tab-' + name).classList.toggle('active', name === t)
    document.getElementById('tab-btn-' + name).classList.toggle('active', name === t)
  })
}

function setAgent(id, state) {
  const el = document.getElementById(id)
  el.className = 'agent-pill ' + state
  const i = el.querySelector('i')
  if (state === 'running') i.className = 'ti ti-loader'
  else if (state === 'done') i.className = 'ti ti-circle-check'
  else i.className = 'ti ti-circle'
}

function copyCover() {
  navigator.clipboard.writeText(document.getElementById('coverText').textContent).then(() => {
    const btn = document.getElementById('copyBtn')
    btn.innerHTML = '<i class="ti ti-check" style="font-size:14px" aria-hidden="true"></i>Copied'
    btn.classList.add('copied')
    setTimeout(() => {
      btn.innerHTML = '<i class="ti ti-copy" style="font-size:14px" aria-hidden="true"></i>Copy'
      btn.classList.remove('copied')
    }, 2000)
  })
}

function toggleNote(i) {
  const item = document.querySelector('[data-i="' + i + '"]')
  const cb = item.querySelector('.note-cb')
  if (checked.has(i)) {
    checked.delete(i); item.classList.remove('checked'); cb.innerHTML = ''
  } else {
    checked.add(i); item.classList.add('checked')
    cb.innerHTML = '<i class="ti ti-check" style="font-size:11px" aria-hidden="true"></i>'
  }
  const total = document.querySelectorAll('.note-item').length
  document.getElementById('notesProgress').textContent = checked.size + '/' + total + ' done'
  document.getElementById('notesBadge').textContent = checked.size + '/' + total
}

function renderResults(data) {
  const s = data.fit_score
  const sEl = document.getElementById('scoreNum')
  sEl.textContent = s
  sEl.className = 'score-num ' + (s >= 7 ? 'high' : s >= 4 ? 'mid' : 'low')
  document.getElementById('scoreCompany').textContent = data.company_name
  document.getElementById('scoreRole').textContent = data.role_title

  if (data.red_flags && data.red_flags.length) {
    document.getElementById('redFlagsWrap').style.display = 'block'
    document.getElementById('redFlags').innerHTML = data.red_flags
      .map(f => '<div class="red-flag-item"><i class="ti ti-alert-triangle" aria-hidden="true"></i>' + f + '</div>').join('')
  }

  if (data.quality_flags && data.quality_flags.length) {
    document.getElementById('outputFlagBanner').style.display = 'flex'
    document.getElementById('outputFlagText').textContent = data.quality_flags.join(' · ')
  }

  document.getElementById('coverText').textContent = data.cover_letter

  checked.clear()
  const list = document.getElementById('notesList')
  list.innerHTML = data.cv_notes.map((n, i) =>
    '<li class="note-item" data-i="' + i + '" onclick="toggleNote(' + i + ')">' +
    '<div class="note-cb"></div><div class="note-text">' + n + '</div></li>'
  ).join('')
  const total = data.cv_notes.length
  document.getElementById('notesProgress').textContent = '0/' + total + ' done'
  document.getElementById('notesBadge').textContent = '0/' + total

  document.getElementById('briefText').textContent = data.company_brief
  document.getElementById('results').classList.add('visible')
  setTab('cover')
}

async function runPipeline() {
  checked.clear()
  document.getElementById('results').classList.remove('visible')
  document.getElementById('errorCard').classList.remove('visible')
  document.getElementById('redFlagsWrap').style.display = 'none'
  document.getElementById('outputFlagBanner').style.display = 'none'

  const input = mode === 'url'
    ? document.getElementById('urlInput').value.trim()
    : document.getElementById('textInput').value.trim()

  if (!input) {
    const e = document.getElementById('errorCard')
    e.textContent = mode === 'url' ? 'Please enter a job posting URL.' : 'Please paste a job description.'
    e.classList.add('visible')
    return
  }

  const btn = document.getElementById('runBtn')
  btn.disabled = true
  btn.innerHTML = '<i class="ti ti-loader" style="font-size:14px;animation:spin 1s linear infinite" aria-hidden="true"></i>Running'

  document.getElementById('progressCard').classList.add('visible')
  setAgent('p1', 'running')
  setTimeout(function() { setAgent('p1', 'done'); setAgent('p2', 'running'); setAgent('p3', 'running'); setAgent('p4', 'running') }, 4000)
  setTimeout(function() { setAgent('p2', 'done'); setAgent('p3', 'done'); setAgent('p4', 'done'); setAgent('p5', 'running') }, 14000)

  try {
    const body = mode === 'url' ? { url: input } : { raw_text: input }
    const res = await fetch('/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    })
    const data = await res.json()
    if (!res.ok) throw new Error(data.error || 'Pipeline failed')
    setAgent('p5', 'done')
    setTimeout(function() { document.getElementById('progressCard').classList.remove('visible') }, 800)
    renderResults(data)
  } catch (e) {
    const err = document.getElementById('errorCard')
    err.textContent = 'Error: ' + e.message
    err.classList.add('visible')
    document.getElementById('progressCard').classList.remove('visible')
  } finally {
    btn.disabled = false
    btn.innerHTML = '<i class="ti ti-player-play" style="font-size:14px" aria-hidden="true"></i>Run'
  }
}
</script>
</body>
</html>
